services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: partnr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=partnr;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__Key: ${JWT_KEY:-CHANGE_ME_USE_A_LONG_SECRET_KEY_AT_LEAST_32_CHARS}
      Jwt__Issuer: PartnR.Api
      Jwt__Audience: PartnR.Client
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-http://localhost}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
